version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vnatural-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "9391711298"
      POSTGRES_DB: VNatural
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: vnatural-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vnatural-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
